<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Configuration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.3/css/bulma.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <section class="section">
      <div class="container">
        <h1 class="title is-4">Admin Configuration</h1>

        <div class="box mb-5">
          <h2 class="title is-5 mb-4">License</h2>
          <div class="field">
            <div class="columns is-vcentered">
              <div class="column">
                <label class="label"><strong>Customer Key</strong></label>
                <p class="help">Enter your customer key to validate and generate a license</p>
              </div>
              <div class="column is-narrow">
                <div class="control has-icons-right">
                  <input id="customerKey" class="input" type="text" placeholder="Enter customer key..." />
                  <span id="customerKeyStatusIcon" class="icon is-small is-right is-hidden"><i class="fas fa-times-circle"></i></span>
                </div>
                <p id="customerKeyStatusText" class="help is-hidden"></p>
              </div>
            </div>
          </div>
          <div class="field">
            <div class="columns is-vcentered">
              <div class="column">
                <label class="label"><strong>Expiry Date</strong></label>
                <p class="help">Read-only. Populated after a successful license generation.</p>
              </div>
              <div class="column is-narrow">
                <div class="control">
                  <input id="expiryDate" class="input" type="text" readonly />
                </div>
                <span id="expiryCountdown" class="tag mt-2"></span>
                <span id="trialBadge" class="tag is-warning mt-2">TRIAL</span>
              </div>
            </div>
          </div>
        </div>

        <div id="optionsContainer"></div>

        <div id="statusMessage" class="notification is-hidden mt-4">
          <button id="closeStatus" class="delete"></button>
          <span id="statusText"></span>
        </div>
      </div>
    </section>

    <script type="module" src="./licenseGeneration.bundle.mjs"></script>
  </body>
</html>
