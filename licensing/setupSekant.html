<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sekant — Activating</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* Spinner arc: one-sided border trick is cleaner in plain CSS than Tailwind utilities */
    #spinner { border: 3px solid rgba(34, 197, 94, 0.2); border-top-color: #22c55e; }
  </style>
</head>
<body class="min-h-dvh flex items-center justify-center bg-gradient-to-br from-black via-green-950 to-green-900 text-slate-200 font-sans">
  <div class="flex flex-col items-center gap-6 px-12 py-11 bg-black/55 border border-green-500/25 rounded-2xl backdrop-blur-xl text-center min-w-[300px]">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-2">
      <i class="fa-solid fa-shield text-5xl text-green-500"></i>
      <span class="text-base font-bold tracking-[0.2em] uppercase">Sekant</span>
    </div>

    <div class="w-full h-px bg-green-500/15"></div>

    <!-- Spinner / icon -->
    <div class="relative w-[60px] h-[60px] flex items-center justify-center">
      <div id="spinner" class="absolute inset-0 rounded-full animate-spin [animation-duration:0.8s]"></div>
      <div id="icon" class="hidden"></div>
    </div>

    <p id="status" class="text-sm text-slate-400 min-h-[1.4em]">Initialising…</p>

    <div class="w-full h-px bg-green-500/15"></div>

    <p class="text-xs text-green-400/75 tracking-[0.05em] capitalize">Browser: <span id="browser">detecting…</span></p>
  </div>

  <script type="module" src="./lookupFileUrl.mjs"></script>
</body>
</html>
